name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          MONGODB_URI: mongodb://localhost:27017
          JWT_SECRET_KEY: ci-test-secret
        run: |
          pytest tests/unitTest/ --cov=app --cov-report=term-missing --cov-report=xml:coverage-unit.xml -v

      - name: Run integration tests with coverage
        env:
          ENV_FILE: .env.e2e
        run: |
          pytest tests/integrationTest/ --cov=app --cov-report=term-missing --cov-report=xml:coverage-integration.xml -v

      - name: Upload coverage reports
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-unit.xml
            coverage-integration.xml
