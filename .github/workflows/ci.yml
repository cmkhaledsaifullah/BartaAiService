name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          MONGODB_URI: mongodb://localhost:27017
          JWT_SECRET_KEY: ci-test-secret
        run: |
          pytest tests/unitTest/ --cov=app --cov-report=term-missing --cov-fail-under=0 -v

      - name: Run integration tests with coverage
        env:
          ENV_FILE: .env.e2e
        run: |
          pytest tests/integrationTest/ --cov=app --cov-append --cov-report=term-missing --cov-fail-under=0 -v

      - name: Check combined coverage threshold
        run: |
          coverage report --fail-under=95
          coverage xml -o coverage.xml

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage.xml
